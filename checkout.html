
<!DOCTYPE html>

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background-color:#fff;
color:#222;
}

/* HEADER */

header{
background:black;
color:white;
padding:1rem 2rem;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

.brand-wrapper{
display:flex;
align-items:center;
gap:10px;
}

.brand-text{
display:flex;
flex-direction:column;
line-height:1.2;
}

.brand{
font-family:'Playfair Display',serif;
font-size:1.8rem;
font-weight:700;
}

.header-phone{
font-size:14px;
color:goldenrod;
font-weight:bold;
}

.home-icon svg{
width:28px;
height:28px;
fill:white;
cursor:pointer;
}

/* NAVBAR */

nav{
display:flex;
align-items:center;
}

nav a{
color:white;
margin-left:1.5rem;
text-decoration:none;
}

nav a:visited{
color:white;
}

/* HAMBURGER */

.hamburger{
display:none;
font-size:1.8rem;
cursor:pointer;
color:white;
}

/* MOBILE NAVBAR */

@media (max-width:768px){

header{
flex-direction:row;
flex-wrap:wrap;
align-items:flex-start;
}

nav{
display:none;
flex-direction:column;
width:100%;
background:black;
margin-top:1rem;
}

nav a{
padding:0.8rem 1rem;
border-top:1px solid #333;
display:block;
margin-left:0;
}

nav.show{
display:flex;
}

.hamburger{
display:block;
margin-left:auto;
margin-top:0.5rem;
}

}

/* PAGE */

h1{
font-family:'Playfair Display',serif;
font-size:2.5rem;
margin:2rem 0;
text-align:center;
}

.checkout-container{
max-width:900px;
margin:0 auto;
padding:2rem;
}

.form-group{
margin-bottom:1rem;
}

label{
display:block;
font-weight:bold;
margin-bottom:0.3rem;
}

input,textarea,select{
width:100%;
padding:0.6rem;
border:1px solid #ccc;
border-radius:6px;
font-size:1rem;
}

.summary-box{
margin-bottom:1.5rem;
}

.summary-box h3{
margin-bottom:0.5rem;
font-size:1.1rem;
}

.summary-box ul{
list-style:disc;
margin-left:1.5rem;
}

.total-box{
font-size:1.3rem;
margin:1.5rem 0 0.5rem;
font-weight:bold;
text-align:right;
}

.note{
color:darkred;
font-weight:bold;
text-align:right;
margin-bottom:0.3rem;
}

.delivery-note{
color:#555;
text-align:right;
}

button{
background:black;
color:white;
border:none;
padding:0.8rem 2rem;
border-radius:30px;
cursor:pointer;
font-weight:bold;
display:block;
margin-left:auto;
}

button:hover{
background:#FFD700;
color:black;
}

.marquee{
background:black;
color:white;
font-weight:bold;
padding:0.7rem 0;
overflow:hidden;
white-space:nowrap;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

footer{
text-align:center;
font-size:0.9rem;
color:#777;
padding:1rem 0;
background:#f9f9f9;
}

.empty-msg{
text-align:center;
color:#888;
font-weight:bold;
margin:2rem 0;
}

@media(max-width:768px){

.checkout-container{
padding:1rem;
}

h1{
font-size:2rem;
}

button{
width:100%;
}

}

</style>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js" defer></script>
</head>
