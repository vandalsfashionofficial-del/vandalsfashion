<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Custom Order - Vandals Fashion</title>

<link rel="stylesheet" href="style.css"/>
<link rel="icon" href="images/favicon.png"/>

<script type="module" src="firebase-config.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js" defer></script>

<script>
document.addEventListener("DOMContentLoaded",()=>{
if(window.emailjs && typeof emailjs.init==="function"){
emailjs.init("CB8hwx-xnlGQcO9aL");
}
});
</script>

<style>

body{
margin:0;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background-color:#f9f9f9;
}

header{
background:#000;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:1rem;
}

.brand-wrapper{
display:flex;
align-items:center;
gap:10px;
}

.brand-text{
display:flex;
flex-direction:column;
line-height:1.2;
}

.header-phone{
font-size:14px;
color:goldenrod;
font-weight:bold;
}

.home-icon svg{
width:28px;
height:28px;
fill:white;
cursor:pointer;
}

.nav-right{
display:flex;
align-items:center;
gap:15px;
}

/* HAMBURGER */
.menu-toggle{
display:none;
flex-direction:column;
cursor:pointer;
gap:4px;
}

.menu-toggle div{
width:25px;
height:3px;
background:white;
}

/* NAV LINKS */
#navbar{
display:flex;
gap:1rem;
}

#navbar a{
color:white;
text-decoration:none;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}
#authLink{
color:white;
text-decoration:none;
}
/* MOBILE NAV */
@media (max-width:768px){

.menu-toggle{
display:flex;
}

#navbar{
display:none;
flex-direction:column;
background:black;
position:absolute;
top:60px;
left:0;
width:100%;
padding:1rem;
z-index:9999;
}

#navbar.show{
display:flex;
}

#navbar a{
padding:10px 0;
border-bottom:1px solid #444;
}

}

main{
padding:2rem;
max-width:760px;
margin:auto;
}

h1{
text-align:center;
color:#333;
}

form{
display:flex;
flex-direction:column;
}

label{
margin-top:1rem;
font-weight:bold;
}

input[type="text"],
input[type="tel"],
textarea{
padding:0.5rem;
margin-top:0.25rem;
border:1px solid #ccc;
border-radius:4px;
width:100%;
box-sizing:border-box;
}

input[type="file"]{
margin-top:0.5rem;
}

button{
margin-top:1.5rem;
background:black;
color:white;
padding:0.75rem;
border:none;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#333;
}

#loading{
display:none;
margin-top:10px;
text-align:center;
font-weight:bold;
color:#222;
}

#imagePreview{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.preview-thumb{
width:120px;
height:120px;
object-fit:cover;
border-radius:8px;
border:1px solid #ddd;
}

.small-muted{
font-size:13px;
color:#666;
margin-top:6px;
}

footer{
text-align:center;
font-size:0.9rem;
color:#777;
padding:2rem 0 1rem;
background:#f9f9f9;
}

</style>

</head>

<body>

<header>

<div class="brand-wrapper">

<a href="index.html" class="home-icon">
<svg viewBox="0 0 24 24">
<path d="M12 3l9 8-1.5 1.7L18 11.2V20a1 1 0 0 1-1 1h-4v-6h-2v6H7a1 1 0 0 1-1-1v-8.8L4.5 12.7 3 11l9-8z"/>
</svg>
</a>

<div class="brand-text">
<strong class="brand">Vandals Fashion</strong>
<span class="header-phone">📞 +91 78374 98898</span>
</div>

</div>

<div class="nav-right">

<div class="menu-toggle" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<div id="profileContainer" style="position:relative;display:none;">
<img id="profile-Pic" src="" alt="Profile"
style="width:35px;height:35px;border-radius:50%;cursor:pointer;">
<div id="profileDropdown"
style="display:none;position:absolute;top:40px;right:0;background:white;color:black;border:1px solid #ccc;border-radius:8px;width:150px;z-index:1000;">
<a href="auth.html" style="display:block;padding:10px;text-decoration:none;color:black;">Manage Account</a>
<a href="#" onclick="logout()" style="display:block;padding:10px;text-decoration:none;color:black;">Logout</a>
</div>
</div>

<a id="authLink" href="auth.html" style="display:none;">Login</a>

</div>

<nav id="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="shop.html">Shop</a>
<a href="explore.html">Explore</a>
<a href="custom-order.html">Customised Orders</a>
<a href="contact.html">Contact</a>
<a href="cart.html">🛒</a>
<a href="orders.html">Your Orders</a>
<a href="Directions.html">Directions</a>
</nav>

</header>

<script type="module">
window.toggleMenu=function(){
const nav=document.getElementById('navbar');
if(nav) nav.classList.toggle('show');
};
</script>

<main>

<h1>Custom Order</h1>

<div id="loading">
Uploading image(s)... please wait
</div>

<label for="referenceImage">Upload Reference Image(s) (required)</label> <input type="file" id="referenceImage" accept="image/*" multiple required/>

<div class="small-muted">You can upload multiple images. They are required.</div>

<div id="imagePreview"></div>

<label for="size">Size</label> <input type="text" id="size"/>

<label for="description">Order Description</label>

<textarea id="description" rows="4" required></textarea>

<form id="customOrderForm">

<label for="name">Your Name</label> <input type="text" id="name" required/>

<label for="phone">Phone Number</label> <input type="tel" id="phone" required/>

<button type="submit" id="submitBtn">Submit Request</button>

</form>

</main>

<script type="module" src="custom-order.js"></script>

</body>
</html>
