<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cancel Requests - Admin</title>

  <style>
    body {
      font-family: Arial;
      background: #fff5fa;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #e91e63;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px auto;
      max-width: 600px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
      margin-top: 10px;
      margin-right: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .approve {
      background: #4CAF50;
      color: white;
    }

    .reject {
      background: #f44336;
      color: white;
    }
  </style>
</head>
<body>

<h2>Cancel Requests (Admin)</h2>

<div id="requests"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0qTqa00ob40CjE0ROHIg0yJVZ9wGzDW3frE36R5K9xJ0Y6PS1w0Ioxyhk4iDGZCM/exec";

async function loadRequests() {
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      secret: "MYSUPERSECRETSCRIPTaBc09*7^@$Secure",
      type: "get_cancel_requests",
      origin: window.location.origin
    })
  });

  const data = await res.json();

  const container = document.getElementById("requests");
  container.innerHTML = "";

  // skip header row if exists
  data.slice(1).forEach(row => {
    const [type, name, orderId, phone, reason, status, date] = row;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <p><b>Name:</b> ${name}</p>
      <p><b>Order ID:</b> ${orderId}</p>
      <p><b>Phone:</b> ${phone}</p>
      <p><b>Reason:</b> ${reason}</p>
      <p><b>Status:</b> ${status}</p>

      ${
        status === "Pending"
          ? `
        <button class="approve" onclick="updateStatus('${orderId}', 'Approved')">Approve</button>
        <button class="reject" onclick="updateStatus('${orderId}', 'Rejected')">Reject</button>
      `
          : ""
      }
    `;

    container.appendChild(card);
  });
}

async function updateStatus(orderId, status) {
  if (!confirm(`Are you sure you want to ${status} this cancel request?`)) return;

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      secret: "MYSUPERSECRETSCRIPTaBc09*7^@$Secure",
      type: "update_cancel_status",
      origin: window.location.origin,
      orderId: orderId,
      status: status
    })
  });

  alert("Updated!");
  loadRequests();
}

loadRequests();
</script>

</body>
</html>
