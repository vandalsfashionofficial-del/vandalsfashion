<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cancel Requests - Admin</title>

  <style>
  body {
    font-family: 'Quicksand', sans-serif;
    background: #ffffff;
    margin: 0;
    padding: 20px;
    color: #111;
  }

  h2 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
  }

  .container {
    max-width: 800px;
    margin: auto;
  }

  .card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid #eee;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    transition: 0.2s ease;
  }

  .card:hover {
    transform: translateY(-3px);
  }

  .label {
    font-size: 12px;
    color: #888;
  }

  .value {
    font-weight: 600;
    margin-bottom: 10px;
  }

  .status {
    font-weight: bold;
    margin-top: 10px;
  }

  .pending { color: orange; }
  .approved { color: green; }
  .rejected { color: red; }

  .btn {
    padding: 10px 16px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    margin-right: 10px;
    margin-top: 10px;
    transition: 0.2s;
  }

  .approve {
    background: #000;
    color: #fff;
  }

  .approve:hover {
    background: #333;
  }

  .reject {
    background: #f2f2f2;
    color: #000;
  }

  .reject:hover {
    background: #ddd;
  }
</style>
</head>
<body>

<h2>Cancel Requests (Admin)</h2>

<div id="requests"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0qTqa00ob40CjE0ROHIg0yJVZ9wGzDW3frE36R5K9xJ0Y6PS1w0Ioxyhk4iDGZCM/exec";

async function loadRequests() {
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      secret: "MYSUPERSECRETSCRIPTaBc09*7^@$Secure",
      type: "get_cancel_requests",
      origin: window.location.origin
    })
  });

  const data = await res.json();

  const container = document.getElementById("requests");
  container.innerHTML = "";

  // skip header row if exists
  data.slice(1).forEach(row => {
    const [type, name, orderId, phone, reason, status, date] = row;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
  <div class="label">Customer</div>
  <div class="value">${name}</div>

  <div class="label">Order ID</div>
  <div class="value">${orderId}</div>

  <div class="label">Phone</div>
  <div class="value">${phone}</div>

  <div class="label">Reason</div>
  <div class="value">${reason}</div>

  <div class="status ${status.toLowerCase()}">Status: ${status}</div>

  ${
    status === "Pending"
      ? `
    <button class="btn approve" onclick="updateStatus('${orderId}', 'Approved')">
      Approve
    </button>
    <button class="btn reject" onclick="updateStatus('${orderId}', 'Rejected')">
      Reject
    </button>
  `
      : ""
  }
`;

    container.appendChild(card);
  });
}

async function updateStatus(orderId, status) {
  if (!confirm(`Are you sure you want to ${status} this cancel request?`)) return;

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      secret: "MYSUPERSECRETSCRIPTaBc09*7^@$Secure",
      type: "update_cancel_status",
      origin: window.location.origin,
      orderId: orderId,
      status: status
    })
  });

  alert("Updated!");
  loadRequests();
}

loadRequests();
</script>

</body>
</html>
