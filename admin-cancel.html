<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cancel Requests - Admin</title>

 <style>
  body {
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #fff0f6, #fff);
    margin: 0;
    padding: 20px;
    color: #111;
  }

  h2 {
    text-align: center;
    margin-bottom: 30px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .container {
    max-width: 900px;
    margin: auto;
  }

  .card {
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 20px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    box-shadow: 
      0 8px 30px rgba(0,0,0,0.08),
      inset 0 0 10px rgba(255,255,255,0.4);
    transition: 0.25s ease;
  }

  .card:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 
      0 12px 40px rgba(0,0,0,0.12),
      0 0 10px rgba(255, 215, 0, 0.2);
  }

  .label {
    font-size: 12px;
    color: #999;
  }

  .value {
    font-weight: 600;
    margin-bottom: 12px;
    color: #222;
  }

  .status {
    font-weight: bold;
    margin-top: 10px;
  }

  .pending { color: #ff9800; }
  .approved { color: #4CAF50; }
  .rejected { color: #f44336; }

  .btn {
    padding: 10px 18px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    margin-right: 10px;
    margin-top: 12px;
    transition: 0.25s;
  }

  .approve {
    background: linear-gradient(45deg, #ffd700, #ffb347);
    color: #000;
    box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
  }

  .approve:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255, 215, 0, 0.6);
  }

  .reject {
    background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
    color: white;
    box-shadow: 0 4px 12px rgba(255, 77, 109, 0.4);
  }

  .reject:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255, 77, 109, 0.6);
  }

  .top-bar {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 15px;
  }
</style>
</head>
<body>

<h2>Cancel Requests (Admin)</h2>

<div id="requests"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0qTqa00ob40CjE0ROHIg0yJVZ9wGzDW3frE36R5K9xJ0Y6PS1w0Ioxyhk4iDGZCM/exec";
</script><script type="module">
import { auth } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

onAuthStateChanged(auth, (user) => {

  if (!user) {
    alert("Login required");
    window.location.href = "auth.html";
    return;
  }

  // 🔒 ONLY ADMIN EMAIL ALLOWED
  if (user.email !== "vandalsfashionofficial@gmail.com") {
    alert("Access Denied 🚫");
    window.location.href = "index.html";
    return;
  }

  // ✅ ONLY RUN ADMIN PANEL AFTER AUTH
  loadRequests();
});
</script>
  <script>
async function loadRequests() {
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "get_cancel_requests",
      origin: window.location.origin
    })
  });

  const data = await res.json();

  const container = document.getElementById("requests");
  container.innerHTML = "";

   // remove header row
let rows = data.slice(1);

// 🧠 SORT LOGIC
rows.sort((a, b) => {
  const statusA = a[5]; // Pending / Approved / Rejected
  const statusB = b[5];

  const timeA = new Date(a[6]).getTime();
  const timeB = new Date(b[6]).getTime();

  // 1. Pending always on top
  const isPendingA = statusA === "Pending";
  const isPendingB = statusB === "Pending";

  if (isPendingA && !isPendingB) return -1;
  if (!isPendingA && isPendingB) return 1;

  // 2. inside same group → newest first
  return timeB - timeA;
});

  // skip header row if exists
  rows.forEach(row => {
    const [type, name, orderId, phone, reason, status, date] = row;

    const card = document.createElement("div");
    card.className = "card";

   card.innerHTML = `
  <div class="label">Customer</div>
  <div class="value">${name}</div>

  <div class="label">Order ID</div>
  <div class="value">${orderId}</div>

  <div class="label">Phone</div>
  <div class="value">${phone}</div>

  <div class="label">Reason</div>
  <div class="value">${reason}</div>

  <div class="status ${status.toLowerCase()}">Status: ${status}</div>

  ${
    status === "Pending"
      ? `
    <button class="btn approve" onclick="updateStatus('${orderId}', 'Approved')">
      ✔ Approve
    </button>
    <button class="btn reject" onclick="updateStatus('${orderId}', 'Rejected')">
      ✖ Reject
    </button>
  `
      : ""
  }
`;

    container.appendChild(card);
  });
}

async function updateStatus(orderId, status) {
  if (!confirm(`Are you sure you want to ${status} this cancel request?`)) return;

  await fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      type: "update_cancel_status",
      origin: window.location.origin,
      orderId: orderId,
      status: status
    })
  });

  alert("Updated!");
  loadRequests();
}
window.updateStatus = updateStatus;
</script>

</body>
</html>
