
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Signup – Vandals Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fffafc;
color:#222;
}

header{
background:black;
color:white;
padding:1rem 2rem;
display:flex;
justify-content:space-between;
align-items:center;
position:relative;
}

nav a{
color:white;
margin-left:1.5rem;
text-decoration:none;
}

.profile-container{
position:relative;
display:inline-block;
margin-left:1.5rem;
}

.profile-pic{
width:30px;
height:30px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
right:0;
background:white;
color:black;
min-width:150px;
box-shadow:0 8px 16px rgba(0,0,0,0.2);
z-index:1000;
border-radius:5px;
overflow:hidden;
}

.dropdown a{
display:block;
padding:10px 15px;
text-decoration:none;
color:black;
font-size:0.95rem;
}

.dropdown a:hover{
background:#f2f2f2;
}

.hamburger{
display:none;
font-size:1.8rem;
cursor:pointer;
color:white;
}

.brand-wrapper{
display:flex;
align-items:center;
gap:0.5rem;
}

.home-icon svg{
width:28px;
height:28px;
fill:white;
}

.brand-text{
display:flex;
flex-direction:column;
line-height:1.2;
}

.brand{
font-family:'Playfair Display',serif;
font-size:1.8rem;
font-weight:700;
}

.header-phone{
color:#ffd700;
font-size:1rem;
}

.container{
max-width:400px;
margin:2rem auto;
padding:2rem;
background:white;
box-shadow:0 0 15px rgba(0,0,0,0.1);
border-radius:10px;
border-top:5px solid #FFD700;
}

h2{
text-align:center;
font-family:'Playfair Display',serif;
}

input{
width:100%;
padding:0.7rem;
margin-bottom:1rem;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:black;
color:white;
padding:0.7rem 1.5rem;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
width:100%;
}

button:hover{
background:#FFD700;
color:black;
}

.toggle{
text-align:center;
margin-top:1rem;
}

.toggle a{
color:#e91e63;
cursor:pointer;
}

.hidden{
display:none;
}

.google-btn{
margin-top:1rem;
background:#fff;
color:#444;
border:1px solid #ccc;
padding:0.7rem;
border-radius:30px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.google-btn img{
width:20px;
height:20px;
margin-right:10px;
}

/* MOBILE NAVBAR */

@media (max-width:768px){

header{
flex-direction:row;
flex-wrap:wrap;
align-items:flex-start;
}

nav{
display:none;
flex-direction:column;
width:100%;
background:black;
margin-top:1rem;
}

nav a{
padding:0.8rem 1rem;
border-top:1px solid #333;
display:block;
margin-left:0;
}

nav.show{
display:flex;
}

.hamburger{
display:block;
margin-left:auto;
margin-top:0.5rem;
}

}

</style>
</head>

<body>

<header>

<div class="brand-wrapper">

<a href="index.html" class="home-icon">
<svg viewBox="0 0 24 24">
<path d="M12 3l9 8-1.5 1.7L18 11.2V20a1 1 0 0 1-1 1h-4v-6h-2v6H7a1 1 0 0 1-1-1v-8.8L4.5 12.7 3 11l9-8z"/>
</svg>
</a>

<div class="brand-text">
<strong class="brand">Vandals Fashion</strong>
<span class="header-phone">📞 +91 78374 98898</span>
</div>

</div>

<div class="hamburger" onclick="toggleMenu()">☰</div>

<nav id="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="shop.html">Shop</a>
<a href="explore.html">Explore</a>
<a href="custom-order.html">Customised Orders</a>
<a href="contact.html">Contact</a>
<a href="cart.html">🛒</a>
<a href="orders.html">Your Orders</a>
<a href="directions.html">Directions</a>
<a href="auth.html" id="authLink">Login</a>
</nav>

</header>

<div class="container">

<h2 id="formTitle">Login</h2>

<div id="loginForm">

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">

<button onclick="login()">Login</button>

<div class="toggle">
Don't have an account? <a onclick="showSignup()">Sign up</a>
</div>

<div class="google-btn" onclick="googleSignIn()">
<img src="https://img.icons8.com/color/48/000000/google-logo.png">
Sign in with Google
</div>
<hr style="margin:15px 0">

<input type="tel" id="phoneNumber" placeholder="Enter Phone Number (+91...)">

<button onclick="sendOTP()">Send OTP</button>

<input type="text" id="otpCode" placeholder="Enter OTP">

<button onclick="verifyOTP()">Verify & Login</button>

<div id="recaptcha-container"></div>
</div>

<div id="signupForm" class="hidden">

<input type="text" id="signupUsername" placeholder="Username">
<input type="email" id="signupEmail" placeholder="Email">
<input type="password" id="signupPassword" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<div class="toggle">
Already have an account? <a onclick="showLogin()">Login</a>
</div>

</div>

</div>

<script>
function toggleMenu(){
document.getElementById("navbar").classList.toggle("show");
}
</script>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
