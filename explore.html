<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explore – Vandals Fashion</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#fff;
color:#222;
}

/* HEADER */

header{
background:black;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0.5rem 1rem;
position:relative;
z-index:1000;
}

/* BRAND */

.brand-wrapper{
display:flex;
align-items:center;
gap:10px;
}

.brand-text{
display:flex;
flex-direction:column;
line-height:1.2;
}

.header-phone{
font-size:14px;
color:goldenrod;
font-weight:bold;
}

.home-icon svg{
width:28px;
height:28px;
fill:white;
cursor:pointer;
}

/* NAV */

nav{
display:flex;
gap:1rem;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
font-size:0.9rem;
}
nav{
position:relative;
z-index:1001;
}

/* LOGIN FIX */

#authLink{
color:white;
text-decoration:none;
font-size:0.9rem;
}

/* RIGHT SIDE */

.nav-right{
display:flex;
align-items:center;
gap:15px;
position:relative;
}

/* HAMBURGER */

.menu-toggle{
display:none;
flex-direction:column;
cursor:pointer;
gap:4px;
}

.menu-toggle div{
width:25px;
height:3px;
background:white;
}

/* PROFILE */

#profile-Pic{
width:22px;
height:22px;
border-radius:50%;
object-fit:cover;
cursor:pointer;
}

#profileDropdown{
position:absolute;
top:40px;
right:0;
background:white;
border:1px solid #ccc;
border-radius:8px;
width:150px;
display:none;
z-index:9999;
}

#profileDropdown.show{
display:block;
}

/* PAGE */

h1{
text-align:center;
font-size:2.5rem;
margin:2rem 0 1rem;
font-family:'Playfair Display',serif;
}

/* CATEGORY */

.category-boxes{
display:flex;
flex-direction:column;
align-items:center;
padding:1rem;
gap:1.5rem;
max-width:1000px;
margin:auto;
}

.category-box{
position:relative;
width:90%;
max-width:700px;
padding:2rem;
border-radius:20px;
font-size:1.8rem;
font-family:'Playfair Display',serif;
background:white;
color:black;
cursor:pointer;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
display:flex;
align-items:center;
justify-content:flex-start;
overflow:hidden;
transition:background 0.4s;
}

.category-box::before{
content:"";
position:absolute;
top:0;
right:-100%;
width:60%;
height:100%;
background:url("https://i.ibb.co/RkDkLcNj/images.jpg") center/cover no-repeat;
transition:right 0.5s;
z-index:1;
}

.category-box:hover{
background:linear-gradient(to right,#f9d3ec,#e0c9ff);
}

.category-box:hover::before{
right:0;
}

.category-box span{
position:relative;
z-index:2;
}

/* FOOTER */

footer{
text-align:center;
font-size:0.9rem;
color:#777;
padding:2rem 0 1rem;
background:#f9f9f9;
}

/* MARQUEE */

.marquee{
background:black;
color:white;
font-weight:bold;
padding:0.7rem 0;
overflow:hidden;
white-space:nowrap;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* MOBILE */

@media(max-width:768px){

.menu-toggle{
display:flex;
}

#profile-Pic{
width:32px;
height:32px;
}

nav{
display:none;
flex-direction:column;
background:black;
position:absolute;
top:100%;
left:0;
width:100%;
padding:1rem;
}

nav.show{
display:flex;
position:absolute;
top:70px;
left:0;
width:100%;
background:black;
z-index:2000;
}
}

nav a{
margin:0.5rem 0;
text-align:left;
width:100%;
padding-left:1rem;
}

}

</style>
</head>

<body>

<header>

<div class="brand-wrapper">

<a href="index.html" class="home-icon">
<svg viewBox="0 0 24 24">
<path d="M12 3l9 8-1.5 1.7L18 11.2V20a1 1 0 0 1-1 1h-4v-6h-2v6H7a1 1 0 0 1-1-1v-8.8L4.5 12.7 3 11l9-8z"/>
</svg>
</a>

<div class="brand-text">
<strong class="brand">Vandals Fashion</strong>
<span class="header-phone">📞 +91 78374 98898</span>
</div>

</div>

<div class="nav-right">

<div class="menu-toggle" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

<div id="profileContainer" style="position:relative;display:none;">
<img id="profile-Pic" src="" alt="Profile" onclick="toggleProfileDropdown()">

<div id="profileDropdown">
<a href="auth.html" style="display:block;padding:10px;color:black;text-decoration:none;">Manage Account</a>
<a href="#" onclick="logout()" style="display:block;padding:10px;color:black;text-decoration:none;">Logout</a>
</div>

</div>

<a id="authLink" href="auth.html" style="display:none;">Login</a>

</div>

<nav id="navbar">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="shop.html">Shop</a>
<a href="explore.html">Explore</a>
<a href="custom-order.html">Customised Orders</a>
<a href="contact.html">Contact</a>
<a href="cart.html">🛒</a>
<a href="orders.html">Your Orders</a>
<a href="Directions.html">Directions</a>
</nav>

</header>

<h1>Explore Our Categories</h1>

<div class="category-boxes" id="categoryContainer"></div>

<div class="marquee">
<span>ELEGANCE • STYLE • LUXURY • FASHION • ELEGANCE • STYLE • LUXURY • FASHION •</span>
</div>

<footer>
© 2025 Vandals Fashion. All rights reserved.
</footer>

<script>

window.toggleMenu=function(){
const nav=document.getElementById("navbar");
nav.classList.toggle("show");
}

window.toggleProfileDropdown=function(){
const d=document.getElementById("profileDropdown");
d.classList.toggle("show");
}

</script>

<script type="module" src="explore.js"></script>

</body>
</html>
